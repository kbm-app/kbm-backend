name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner installed directly on the target VPS (see
    # deploy/DEPLOYMENT.md, step 10). GitHub-hosted runners are blocked by an
    # account-level billing issue that persists even with a public repo — see
    # DEPLOYMENT.md for the full story before switching this back.
    runs-on: [self-hosted, kbm]
    steps:
      - uses: actions/checkout@v4

      # Vendor is intentionally excluded — the app container runs `composer install`
      # itself on every start (see deploy/docker-compose.yml), so it doesn't need
      # to be synced here.
      - name: Sync to deploy directory
        run: |
          rsync -a --delete \
            --exclude='vendor' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.backup' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='.phpunit.cache' \
            ./ /var/www/kbm/kbm-backend/

      # `app`'s command chain reinstalls composer deps, caches config/routes, and
      # runs `migrate --force` on every start — a restart is a full redeploy.
      - name: Restart containers
        run: |
          cd /var/www/kbm/deploy
          docker compose -p kbm restart app queue web
